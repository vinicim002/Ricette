spring.application.name=backend

# Datasource
spring.datasource.url=jdbc:postgresql://localhost:5432/ricette
spring.datasource.username=ricette_user
spring.datasource.password=ricette_pass
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Admin (single-user)
app.admin.email=admin@ricette.dev
app.admin.password=admin123

# JWT
app.jwt.secret=ricette-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm
app.jwt.expiration-ms=86400000

# CORS
app.cors.allowed-origins=http://localhost:5173
