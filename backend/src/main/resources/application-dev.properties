# Perfil de desenvolvimento local (docker-compose na raiz do projeto)

server.port=8080

# PostgreSQL — valores padrão do docker-compose.yaml
spring.datasource.url=jdbc:postgresql://localhost:5432/ricette
spring.datasource.username=ricette_user
spring.datasource.password=ricette_pass

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT — apenas para desenvolvimento; troque em produção
app.jwt.secret=dev-secret-ricette-local-min-32-chars
app.jwt.expiration-ms=86400000

# Frontend Vite (proxy em /api ou acesso direto)
app.cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173

logging.level.org.hibernate.SQL=DEBUG
logging.level.com.vinicius.backend=DEBUG
