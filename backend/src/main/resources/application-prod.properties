# Produção (Railway). Segredos vêm das variáveis de ambiente do painel.
# PostgreSQL: variáveis PG* injetadas ao vincular o plugin Postgres no Railway.

server.port=${PORT:8080}

spring.datasource.url=jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}

# Sem Flyway por enquanto
spring.jpa.hibernate.ddl-auto=update

app.admin.email=${APP_ADMIN_EMAIL}
app.admin.password=${APP_ADMIN_PASSWORD}
app.jwt.secret=${APP_JWT_SECRET}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS}
