# Produção — Render, Railway ou JDBC manual.
# Render: vincule o Postgres (injeta DATABASE_URL — convertida automaticamente).
# Railway: use referências PGHOST, PGPORT, PGUSER, PGPASSWORD, PGDATABASE.
# Manual: SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD.

server.port=${PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://${DATABASE_HOST:${PGHOST}}:${DATABASE_PORT:${PGPORT}}/${DATABASE_NAME:${PGDATABASE}}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DATABASE_USER:${PGUSER}}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DATABASE_PASSWORD:${PGPASSWORD}}}

spring.jpa.hibernate.ddl-auto=update

app.admin.email=${APP_ADMIN_EMAIL}
app.admin.password=${APP_ADMIN_PASSWORD}
app.jwt.secret=${APP_JWT_SECRET}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS}
