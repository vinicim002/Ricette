# Produção — DataSource configurado por DatabaseUrlEnvironmentPostProcessor:
# DATABASE_URL (Render) ou DATABASE_* / PG* ou SPRING_DATASOURCE_*.

server.port=${PORT:8080}

# Opcional: JDBC manual (se não usar DATABASE_URL)
spring.datasource.url=${SPRING_DATASOURCE_URL:}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update

app.admin.email=${APP_ADMIN_EMAIL}
app.admin.password=${APP_ADMIN_PASSWORD}
app.jwt.secret=${APP_JWT_SECRET}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS}
