# Blueprint Render — https://render.com/docs/blueprint-spec
# Dashboard: New → Blueprint → conecte o repositório e revise os secrets.

databases:
  - name: ricette-db
    plan: free
    databaseName: ricette
    user: ricette

services:
  - type: web
    name: ricette-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: APP_JWT_EXPIRATION_MS
        value: "86400000"
      - key: APP_ADMIN_EMAIL
        sync: false
      - key: APP_ADMIN_PASSWORD
        sync: false
      - key: APP_JWT_SECRET
        sync: false
      - key: APP_CORS_ALLOWED_ORIGINS
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: ricette-db
          property: connectionString
